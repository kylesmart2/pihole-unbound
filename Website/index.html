<!DOCTYPE html>

<html>
	<head>
		<style>
		#map {	width: 100;
				height: 400px;
				background-color: grey;
			 }
			</style>
  		<title>My map</title>
	</head>

	<body>

	<div id="map"></div>

	<script>
		function initMap() {
			var North_Carolina = {lat: 35.652977, lng: -78.930718}

			var map = new google.maps.Map(document.getElementById('map'), {
				zoom: 10,
				center: North_Carolina
				 });

			var geocoder = new google.maps.Geocoder();
			var incident_location = "Timbercroft Lane, Fayetteville, NC"

			geocoder.geocode( { 'address': incident_location }, function(results) {

				var marker = new google.maps.Marker({
					map: map,
					position: results[0].geometry.location,
					
				})
			})
		}
	</script>

	<script async defer
	src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCJcRnEvHPgBp4oH8hPazm-zQy97_SCKbY&callback=initMap">
		
	</script>


	</body>


</html>
