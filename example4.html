<!DOCTYPE html>


<html>

	<head>
		<Title>Searching Arrays</Title>
		<p>Array Examples</p>
	</head>

	<body>

<!-- SCRIPT 1 STARTS HERE -->
		<script type = "text/javascript">
			
			var a = new Array(100);


			//filling array 
			for (var i = 0; i < a.length; i++)
				a[i] = 2 * i;

			function buttonPressed()	//called in body to use with form
			{
				var searchKey = searchForm.inputVal.value;
				//Array a is passed to linear search
				//is a global variable. Normally
				//be passed to a method for search
				var element = linearSearch(a, parseInt(searchKey));

				if (element != -1)		//if value exists in the array
				{
					searchForm.result.value = "Found value in element";
				}

				else 					//if value doesn't exist in the array
				{
					searchForm.result.value = "Value not found";
				}
			}

			function linearSearch( theArray, key)	//array search function
			{
				for (var n = 0; n < theArray.length; n++)
				{
					if (theArray[n] == key) 	//if value exists in the array
					{
						return n;
					}
				}


				return -1; 						//if value doesn't exist in the array
			}

		</script>
<!-- SCRIPT 1 ENDS HERE -->

		<h2>Sorting two-dimensional array</h2>
<!-- SCRIPT 2 STARTS HERE -->
		<script type ="text/javascript">
			var array = new Array(2);
			

			array = [[2, 6, 3, 4, 8, 2, 8, 3, 9, 10],[8, 1, 9, 4, 8, 1, 9, 8, 5, 54]]; 
				
			outputArray("This is a two dimensional array: ", array);

			bubbleSort(array);

			outputArray("The sorted array is: ", array);


			function outputArray(header, theArray)
			{
				document.writeln(header + theArray.join(" ") + "<br />");
			}

			function bubbleSort(array)
			{

			   var swap;     
			   var temp;     

			   do
			   {
			      swap = false;
			      for (var i = 0; i < array.length; i++)
			      	for (var j = 0; j < array[1].length; j++)
			      
			      		if ((i == 0) && (j == array[1].length - 1))
					    {

					    	if (array[i][j] > array[i+1][j-9])
					    	{
					    		temp = array[i][j];
					       		array[i][j] = array[i+1][j-9];
					       		array[i+1][j-9] = temp;
					       		swap = true;
					    	}
					    }
			         	else if (array[i][j] > array[i][j+1])
			        	 {
			        	 	temp = array[i][j];
			           		array[i][j] = array[i][j+1];
			            	array[i][j+1] = temp;
			            	swap = true;
			         	}

			         	
			         	
			      
			   } while (swap);
			}


		</script>
<!-- SCRIPT 2 ENDS HERE -->

<!-- 	creating the search form and result form for SCRIPT 1	-->

		<h2>Searching array that was dynamically created</h2>
		<form name = "searchForm" action = "">
			<p>Enter integer search key<br />
				<input name = "inputVal" type = "text" />
				<input name = "search" type = "button" value = "Search" 
					onclick = "buttonPressed()" /><br /></p>

			<p>Result<br />
				<input name = "result" type = "text" size = "30" /></p>
		</form>


	</body>
</html>
