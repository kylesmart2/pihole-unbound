<!DOCTYPE html>

<html>

	<p> Prime factor JavaScript program </p>

	<body>

		<h2> This program computes all prime factors of a positive number and displays them </h2>

		
		<!--script to calculate prime factors of a number -->
		<script type = "text/javascript">

			var factors = new Array;	//array variable

			//prompt to get number input
			var num = window.prompt("Please enter an arbitary positive number: ", "0");

			//callilng function
			factor(num);

			//function to find prime factors
			function factor(num)
			{
				var temp;
				
				while (num % 2 == 0)	//if even
				{
					factors.push(2);	//if even add to to prime factors array
					num = num /2;		//get next factor
				}

				var sqroot = Math.sqrt(num);	//square root of number

				for (var i = 3; i <= sqroot; i++)
				{
					while (num % i == 0)	//loop to get all prime factors
					{
						factors.push(i);
						num = num / i;
					}
				}

				if (num > 2)		//adding new prime to array
				{
					factors.push(num)
				}

				document.writeln(factors);		//returning prime
			}


		</script>

		<p> This program calculates the GCD of two arbitrary positive numbers </p>

		

		<!-- script to calculate GCD of two numbers -->
		<script type= "text/javascript">

			var GCD;
			//prompting user for two numbers
			alert("Finding GCD of two numbers");
			var num1 = window.prompt("Please enter a positive number","0");
			var num2 = window.prompt("Please enter another positive number", "0");

			//printing results to webpage by calling function with both numbers
			document.writeln(GCD(num1, num2));

			//function to find GCD
			function GCD(num1, num2)
			{
				if ((num1 == 0) || (num2 == 0))
				{
					return 0;	//GCD = 0 
				}

				if (num1 == num2)
				{
					return num2;	//GCD = one of the numbers
				}

				if (num1 > num2)
				{
					return GCD(num1 - num2, num2);	//calling function with smaller numbers
				}
				else
				{
					return GCD(num2, num2 - num1);	//calling function with smaller numbers
				}

			}

		</script>

	</body>
