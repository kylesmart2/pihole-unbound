<!DOCTYPE html>

<html>
	<head>
		<Title>Fibonacci Numbers</Title>
		
	</head>

	<body>

		<script language = "javascript">

			document.writeln("<h1>Fibonacci numbers</h1>");
			var nextNum;
			
			for (var i = 0; i <= 50; i++)	//for loop to get first 50 Fibonacci numbers
			{	
				// writing to page and calling recursive function
				document.write("<br /> Fib(" + i + ") = " + fib(i));

			}

			function fib(n, memo) //memoization to cache previous fib numbers to speed up recursion, most browsers will kill this function because it takes too long without memoization
			{
				memo = memo || {};	//would've been nice to know before this assignment

				if (memo[n]) 
					return memo[n];
				if (n < 2) 	//if 0 or 1, return that number
					return n;
				
				return memo[n] = fib(n-1, memo) + fib(n-2, memo);
				
			}


		</script>

	</body>
</html>
