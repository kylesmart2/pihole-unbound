		<title>A First Program in  JavaScript</title>
	 
		<script type = "text/javascript">
			var name,
				now = new Date(),
				hour = now.getHours();

				name = window.prompt("Please enter your name","Harry Potter");

				var array = new Array();

				array[0] = now.getMonth() + 1;
				array[1] = now.getDate();
				array[2] = now.getFullYear();

				var date = array.toString();



				document.writeln(now);
				document.writeln("<br />" + hour);
				document.writeln("<br />" + now.getMonth()+ " " + now.getDate()+ " "+now.getFullYear());

				document.writeln("<br />" + date);


				if (hour < 12)
					document.write("<h1> Good Morning, " + name + 
						", welcome to JavaScript programming!</h1>");
				if ((hour >= 12) && (hour < 17))
					document.write("<h1> Good Afternoon, " + name +
						", welcome to JavaScript programming!</h1>");
				if (hour >= 17)
					document.write("<h1> Good Evening, " + name + 
						", welcome to JavaScript programming!</h1>");
		</script>
	
	
		<p> Printing out headers with a for loop.</p>
 		<script type = "text/javascript">

			for (var counter = 1; counter <= 6; counter++)
			{	document.writeln("<h" + counter + ">This is " +
					"an h" + counter + " level head" + "</h" + counter +
					">");
			}

		</script>

		<p>Printing out headers using a do while loop.</p>
		<script type = "text/javascript">

			var counter = 1;

			do   {
				document.writeln("<h" + counter + ">This is " +
					"an h" + counter + " level head" + "</h" + counter +
					">");

				counter ++;
			}

			while (counter <= 6);
		</script>

		<p>Bank account interest calculator</p>

		<script type = "text/javascript">

			var amount = 1000,
			principal = 1,
			rate = 0.05;

			document.writeln("<table border = 1><caption>Interest earned after 10 years</caption<thead><tr></th><th>Years</th><th>Amount</th></tr></thead>")

			for (var year = 1; year <= 10; ++year)
			{
				amount = principal * Math.pow(1.0 + rate, year);
				document.writeln("<tbody><tr><td>" + year + 
					"</td><td>" + Math.round(amount * 1000) / 10  + "</td></tr>");
			}

			document.writeln("</tbody></table>");

		</script>

					}

		<script>

			nextRow: 
				for (var row = 1; row <= 5; row++)
				{
					document.writeln("<br />");

					for (var column = 1; column <= 10; column++)
					{
						if (column > row)
							continue nextRow;

						document.write("* ");
					}
				}
		</script>

		<script type = "text/javascript">

			document.writeln("<h1> Square the number <h1>");

			for (var x = 1; x <= 10; x++)
			{
				document.writeln("The square of " + x + " is " +
					square(x) + "<br />");
			}

			function square(y)
			{
				return y*y;
			}

		</script>
