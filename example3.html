<!-- functions to modify array and not modify array -->
		<script type = "text/javascript">

			start();

			function start()
			{
				var a = [1,2,3,4,5];

				document.writeln("<h2>Effects of passing entire array call-by-reference</h2>");

				outputArray("The values of the original array are: ", a);

				modifyArray(a);

				outputArray("The values of the modified array are: ", a);

				document.writeln("<h2>Effects of passing array" + 
					" element call-by-value</h2>" + 
					"a[3] before modifyElement: " + a[3]);

				modifyElement(a[3]);

				document.writeln("<br />a[3] after modifyElement: " + a[3]);


			}

			function outputArray(header, theArray)
			{
				document.writeln(header + theArray.join(" ") + "<br />");
			}

			function modifyArray(theArray)
			{
				for (var j in theArray)
					theArray[j] *= 2;
			}

			function modifyElement(e)
			{
				e *= 2;
				document.writeln("<br />Value in modifyElement: " + e);
			}


		</script>




		<script type = "text/javascript">

			start()

			function start()
			{
				var a = [10, 1, 9, 2, 8, 3, 7, 4, 6, 5];

				document.writeln("<h1>Sorting an Array</h1>");
				outputArray("Data items in original order: ", a);
				a.sort( compareIntegers);
				outputArray("Data items in ascending order: ", a);

			}

			function outputArray(header, theArray)
			{
				document.writeln("<p>" + header + theArray.join( " ") + "</p>");
			}

			function compareIntegers(value1, value2)
			{
				return parseInt(value1) - parseInt(value2);
			}

		</script>





		<!-- script to define an array, creat search function, and button press function-->
		<script type = "text/javascript">
			
			var a = new Array(100);


			//filling array 
			for (var i = 0; i < a.length; i++)
				a[i] = 2 * i;

			function buttonPressed()	//called in body to use with form
			{
				var searchKey = searchForm.inputVal.value;
				//Array a is passed to linear search
				//is a global variable. Normally
				//be passed to a method for search
				var element = linearSearch(a, parseInt(searchKey));

				if (element != -1)		//if value exists in the array
				{
					searchForm.result.value = "Found value in element";
				}

				else 					//if value doesn't exist in the array
				{
					searchForm.result.value = "Value not found";
				}
			}

			function linearSearch( theArray, key)	//array search function
			{
				for (var n = 0; n < theArray.length; n++)
				{
					if (theArray[n] == key) 	//if value exists in the array
					{
						return n;
					}
				}


				return -1; 						//if value doesn't exist in the array
			}

		</script>

<!-- 	creating the search form and result form 	-->
		<form name = "searchForm" action = "">
			<p>Enter integer search key<br />
				<input name = "inputVal" type = "text" />
				<input name = "search" type = "button" value = "Search" 
					onclick = "buttonPressed()" /><br /></p>

			<p>Result<br />
				<input name = "result" type = "text" size = "30" /></p>
		</form>
